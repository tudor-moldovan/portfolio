<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdings — Valuation, Reverse DCF, Drawdowns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style id="css-tokens">
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1b1814;--sf:#24201b;--sf2:#2e2a23;
  --bd:rgba(238,220,186,.07);--bd2:rgba(238,220,186,.16);
  --tx:#eedcba;--mu:#a9a08c;--di:#6e6552;
  --ac:#d4b88b;--ac2:rgba(212,184,139,.12);--ac3:rgba(212,184,139,.30);
  --gr:#9eaf8a;--gr2:rgba(158,175,138,.14);
  --rd:#c28a75;--rd2:rgba(194,138,117,.14);
  --go:#d4b88b;--go2:rgba(212,184,139,.14);
  --bl:#9aafb0;--bl2:rgba(154,175,176,.14);
  --sans:'Inter',system-ui,sans-serif;
  --mo:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Cormorant Garamond',ui-serif,Georgia,serif;
  --rad:14px;--radS:8px;
  --shM:0 10px 30px -12px rgba(10,6,2,.55),0 2px 6px rgba(10,6,2,.28);
}
:root.light{
  --bg:#f5ecd8;--sf:#fffbf1;--sf2:#ebe0c5;
  --bd:rgba(58,42,20,.10);--bd2:rgba(58,42,20,.20);
  --tx:#2a231a;--mu:#6b5f48;--di:#a39880;
  --ac:#8f6d38;--ac2:rgba(143,109,56,.10);--ac3:rgba(143,109,56,.24);
  --gr:#5c7d52;--gr2:rgba(92,125,82,.10);
  --rd:#a5674d;--rd2:rgba(165,103,77,.10);
  --shM:0 10px 30px -12px rgba(58,42,20,.14),0 2px 6px rgba(58,42,20,.07);
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
.up{color:var(--gr)}.dn{color:var(--rd)}
.mono{font-family:var(--mo);font-variant-numeric:tabular-nums}
</style>
<style id="css-layout">
header{background:rgba(27,24,20,.78);backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid var(--bd);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:50}
:root.light header{background:rgba(245,236,216,.88)}
.brand{display:flex;align-items:center;gap:12px}
.bm{width:38px;height:38px;border:1px solid var(--ac3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:19px;color:var(--ac);transition:.2s}
.bm:hover{background:var(--ac2)}
.bn{font-family:var(--serif);font-weight:500;font-size:20px;letter-spacing:.005em;line-height:1.15}
.bs{font-size:9px;color:var(--mu);font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.hr{display:flex;gap:8px;align-items:center}
.hb{background:transparent;border:1px solid var(--bd2);color:var(--mu);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:7px 12px;border-radius:8px;cursor:pointer;text-decoration:none}
.hb:hover{color:var(--ac);border-color:var(--ac3);background:var(--ac2)}
.tb{background:none;border:1px solid var(--bd);color:var(--mu);cursor:pointer;font-size:14px;border-radius:50%;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center}
.tb:hover{color:var(--ac);border-color:var(--ac3);background:var(--ac2)}

main{max-width:1080px;margin:0 auto;padding:24px 28px 36px;display:flex;flex-direction:column;gap:18px}
@media(max-width:720px){main{padding:16px;gap:14px}header{padding:14px 16px}}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);box-shadow:var(--shM);overflow:hidden}
.ch{padding:16px 22px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ct{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:.005em}
.cb{font-size:10px;color:var(--di);letter-spacing:.14em;text-transform:uppercase;font-weight:600}

.empty{padding:32px 20px;text-align:center;color:var(--mu);font-size:13px}
.err{padding:11px 16px;background:var(--rd2);border:1px solid rgba(194,138,117,.32);border-left:3px solid var(--rd);border-radius:8px;color:var(--rd);font-size:12px;line-height:1.5}
.err strong{font-family:var(--serif);font-weight:600;letter-spacing:.04em}

.footer{text-align:center;font-size:10px;color:var(--di);padding:12px 0 22px;font-family:var(--mo);letter-spacing:.06em}
.footer a{color:var(--mu);text-decoration:none;border-bottom:1px dashed var(--bd2)}
.footer a:hover{color:var(--ac)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--sf);color:var(--tx);border:1px solid var(--bd2);padding:11px 18px;border-radius:10px;font-size:12px;z-index:120;transition:transform .25s;box-shadow:var(--shM);max-width:90vw}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(158,175,138,.45);color:var(--gr)}
.toast.fail{border-color:rgba(194,138,117,.45);color:var(--rd)}
</style>
<style id="css-tables">
.tbl{width:100%;border-collapse:collapse}
.tbl thead th{padding:9px 14px;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--di);background:var(--sf2);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.tbl th.r,.tbl td.r{text-align:right}
.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--bd);font-family:var(--mo);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap;vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.sym{font-family:var(--serif);font-weight:500;font-size:15px;color:var(--ac);letter-spacing:-0.005em}
.sym-meta{font-family:var(--sans);font-size:9px;color:var(--mu);margin-left:5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.zone{display:inline-block;font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid transparent;margin-left:6px;vertical-align:middle}
.zone-cheap{color:var(--gr);background:var(--gr2);border-color:rgba(158,175,138,.32)}
.zone-fair{color:var(--mu);background:var(--sf2);border-color:var(--bd2)}
.zone-expensive{color:var(--rd);background:var(--rd2);border-color:rgba(194,138,117,.32)}
.zone-na{color:var(--di);background:transparent;border-color:var(--bd)}
.pct-bar{display:inline-block;width:60px;height:4px;background:var(--bd2);border-radius:2px;vertical-align:middle;margin-right:6px;position:relative;overflow:hidden}
.pct-bar > i{display:block;height:100%;background:var(--ac);border-radius:2px}
.pct-mark{position:absolute;top:-2px;width:2px;height:8px;background:var(--tx)}
.muted{color:var(--di);font-size:10px;font-family:var(--sans);font-weight:500}

/* DCF panel */
.dcf-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.dcf-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.dcf-row input[type=text],.dcf-row select{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:9px 12px;border-radius:8px;font-family:var(--mo);font-size:13px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.dcf-row input[type=text]{flex:1;min-width:140px}
.dcf-row select{min-width:120px;text-transform:none;cursor:pointer}
.dcf-row input:focus,.dcf-row select:focus{outline:none;border-color:var(--ac3);background:var(--sf)}
.dcf-row button{background:var(--ac2);border:1px solid var(--ac3);color:var(--ac);padding:9px 18px;border-radius:8px;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.2s}
.dcf-row button:hover{background:var(--ac);color:#1b1814}
.dcf-row button:disabled{opacity:.45;cursor:not-allowed}
.dcf-knobs{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.dcf-knobs label{display:flex;align-items:center;gap:6px}
.dcf-knobs input{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:5px 8px;border-radius:6px;font-family:var(--mo);font-size:12px;width:64px;text-align:right;font-variant-numeric:tabular-nums}
.dcf-knobs input:focus{outline:none;border-color:var(--ac3)}
.dcf-out{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:18px}
.dcf-headline{font-family:var(--serif);font-size:18px;line-height:1.5;color:var(--tx);font-weight:500}
.dcf-headline strong{color:var(--ac);font-weight:600;font-variant-numeric:tabular-nums}
.dcf-grid{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;font-family:var(--mo);font-size:11px}
.dcf-grid .k{font-family:var(--sans);font-size:9px;color:var(--di);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.dcf-grid .v{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}

/* Drawdowns */
.dd-stock{padding:14px 22px;border-bottom:1px solid var(--bd)}
.dd-stock:last-child{border-bottom:none}
.dd-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.dd-summary{font-size:11px;color:var(--mu);font-family:var(--mo);font-variant-numeric:tabular-nums;letter-spacing:.02em}
.dd-summary span{margin-right:14px}
.dd-current{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:var(--sans)}
.dd-current.under{color:var(--rd);background:var(--rd2);border:1px solid rgba(194,138,117,.32)}
.dd-current.ok{color:var(--gr);background:var(--gr2);border:1px solid rgba(158,175,138,.32)}
.dd-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;font-family:var(--mo);font-size:11px;font-variant-numeric:tabular-nums}
.dd-row{display:grid;grid-template-columns:90px 70px 90px 1fr;gap:10px;padding:6px 0;border-bottom:1px dashed var(--bd);align-items:center;color:var(--mu)}
.dd-row .pct{font-weight:600;color:var(--rd)}
.dd-row .rec{font-size:10px;color:var(--mu)}
.dd-row .rec.under{color:var(--rd)}
@media(max-width:600px){
  .dd-row{grid-template-columns:1fr 1fr;gap:4px;font-size:10px}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="bm">H</div>
    <div>
      <div class="bn">Holdings</div>
      <div class="bs">Valuation · Reverse DCF · Drawdowns</div>
    </div>
  </div>
  <div class="hr">
    <a href="/edit" class="hb">Edit</a>
    <button class="tb" onclick="toggleTheme()" title="Theme">&#9681;</button>
  </div>
</header>

<main>
  <div id="errBox"></div>

  <section class="card">
    <div class="ch">
      <div class="ct">Valuation Percentile</div>
      <div class="cb" id="valMeta">—</div>
    </div>
    <div id="valBody"><div class="empty">Loading…</div></div>
  </section>

  <section class="card">
    <div class="ch">
      <div class="ct">Reverse DCF</div>
      <div class="cb">What growth is the market pricing in?</div>
    </div>
    <div class="dcf-body">
      <div class="dcf-row">
        <input id="dcfSym" type="text" placeholder="Ticker (e.g. MSFT)" maxlength="10" autocomplete="off">
        <select id="dcfQuick"></select>
        <button id="dcfBtn" onclick="runDcf()">Compute</button>
      </div>
      <div class="dcf-knobs">
        <label>Years <input id="dcfYears" type="number" value="10" min="3" max="20" step="1"></label>
        <label>Discount % <input id="dcfR" type="number" value="10" min="5" max="20" step="0.5"></label>
        <label>Terminal % <input id="dcfTg" type="number" value="3" min="0" max="6" step="0.5"></label>
      </div>
      <div id="dcfOut"></div>
    </div>
  </section>

  <section class="card">
    <div class="ch">
      <div class="ct">Drawdown History</div>
      <div class="cb" id="ddMeta">—</div>
    </div>
    <div id="ddBody"><div class="empty">Loading…</div></div>
  </section>

  <div class="footer">
    <span id="footerMeta">—</span> · <a href="/edit">Edit positions</a>
  </div>
</main>

<div class="toast" id="toast"></div>

<script id="app-helpers">
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt1(n){if(n==null||!isFinite(n))return '—';return n.toFixed(1);}
function fmt2(n){if(n==null||!isFinite(n))return '—';return n.toFixed(2);}
function fmtPct(n){if(n==null||!isFinite(n))return '—';return (n>=0?'+':'')+n.toFixed(1)+'%';}
function fmtPctRaw(n){if(n==null||!isFinite(n))return '—';return n.toFixed(0)+'th';}
function fmtUSDb(n){if(n==null||!isFinite(n))return '—';if(Math.abs(n)>=1e9)return '$'+(n/1e9).toFixed(1)+'B';if(Math.abs(n)>=1e6)return '$'+(n/1e6).toFixed(0)+'M';return '$'+Math.round(n).toLocaleString('en-US');}
function fmtPrice(n){if(n==null||!isFinite(n))return '—';return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pctBar(p){if(p==null)return '<span class="muted">n/a</span>';const w=Math.max(0,Math.min(100,p));return `<span class="pct-bar"><i style="width:${w.toFixed(0)}%"></i><span class="pct-mark" style="left:${w.toFixed(0)}%"></span></span><span class="mono">${p.toFixed(0)}th</span>`;}
function toggleTheme(){document.documentElement.classList.toggle('light');try{localStorage.setItem('hl_theme',document.documentElement.classList.contains('light')?'light':'dark');}catch{}}
function loadTheme(){try{if(localStorage.getItem('hl_theme')==='light')document.documentElement.classList.add('light');}catch{}}
function toast(msg,ok){const el=document.getElementById('toast');el.textContent=msg;el.className='toast on '+(ok?'ok':'fail');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2800);}
function showError(msg){document.getElementById('errBox').innerHTML=`<div class="err"><strong>ERROR</strong> · ${esc(msg)}</div>`;}
function clearError(){document.getElementById('errBox').innerHTML='';}
let POSITIONS=[];
</script>
<script id="app-render">
function renderValuation(d){
  const r=d.results||{};
  const stocks=POSITIONS.filter(p=>p.asset==='Stock');
  if(!stocks.length){document.getElementById('valBody').innerHTML='<div class="empty">No stocks in your positions. ETFs / crypto don\'t have P/E.</div>';return;}
  let html='<table class="tbl"><thead><tr><th>Stock</th><th class="r">Price</th><th class="r">P/E</th><th class="r">Pctile</th><th class="r">FCF Yield</th><th class="r">Pctile</th><th class="r">EV/EBITDA</th><th class="r">Pctile</th></tr></thead><tbody>';
  for(const p of stocks){
    const v=r[p.quoteSym||p.symbol];
    if(!v||v.error){
      html+=`<tr><td><span class="sym">${esc(p.symbol)}</span><span class="sym-meta">${esc(p.broker)}</span></td><td colspan="7" class="muted">${v?esc(v.error):'no data'}</td></tr>`;
      continue;
    }
    const z=v.zones||{},pct=v.percentiles||{},c=v.current||{};
    html+=`<tr>
      <td><span class="sym">${esc(p.symbol)}</span><span class="sym-meta">${esc(p.broker)}</span></td>
      <td class="r">${fmtPrice(c.price)}</td>
      <td class="r">${fmt1(c.pe)}<span class="zone zone-${z.pe||'na'}">${z.pe||'n/a'}</span></td>
      <td class="r">${pctBar(pct.pe)}</td>
      <td class="r">${c.fcfYield!=null?c.fcfYield.toFixed(2)+'%':'—'}<span class="zone zone-${z.fcfYield||'na'}">${z.fcfYield||'n/a'}</span></td>
      <td class="r">${pctBar(pct.fcfYield)}</td>
      <td class="r">${fmt1(c.evEbitda)}<span class="zone zone-${z.evEbitda||'na'}">${z.evEbitda||'n/a'}</span></td>
      <td class="r">${pctBar(pct.evEbitda)}</td>
    </tr>`;
  }
  html+='</tbody></table>';
  html+='<div class="muted" style="padding:10px 22px 14px;font-size:10px;color:var(--di)">Percentile = current value vs the same stock\'s last ~10 yrs (40 quarters of TTM snapshots). Lower P/E or EV/EBITDA percentile = cheaper. Higher FCF yield percentile = cheaper.</div>';
  document.getElementById('valBody').innerHTML=html;
  document.getElementById('valMeta').textContent=`${stocks.length} stocks · 10y history`;
}

function renderDcf(d){
  const out=document.getElementById('dcfOut');
  if(!d){out.innerHTML='';return;}
  if(d.error){out.innerHTML=`<div class="err"><strong>DCF FAILED</strong> · ${esc(d.error)}</div>`;return;}
  const ig=d.impliedGrowth, tg=d.trailingCAGR, delta=d.delta;
  const verdict = (delta==null) ? '' :
    (delta > 3 ? '<span style="color:var(--rd)">priced for optimism vs trailing reality</span>' :
     delta < -3 ? '<span style="color:var(--gr)">priced below trailing reality — possibly cheap</span>' :
     '<span style="color:var(--mu)">priced roughly in line with trailing reality</span>');
  let html=`<div class="dcf-out">
    <div class="dcf-headline">Market is pricing <strong>${d.symbol}</strong> for <strong>${fmt1(ig)}%</strong> FCF growth/yr for ${d.assumptions.years} years, then ${(d.assumptions.terminalGrowth*100).toFixed(1)}% forever (discount ${(d.assumptions.discountRate*100).toFixed(1)}%).<br>
    Trailing 5y FCF CAGR: <strong>${tg!=null?fmt1(tg)+'%':'n/a'}</strong>. ${verdict}</div>
    <div class="dcf-grid">
      <div><div class="k">Latest FCF</div><div class="v">${fmtUSDb(d.inputs.latestFCF)}</div></div>
      <div><div class="k">Market Cap</div><div class="v">${fmtUSDb(d.inputs.marketCap)}</div></div>
      <div><div class="k">Net Debt</div><div class="v">${fmtUSDb(d.inputs.netDebt)}</div></div>
      <div><div class="k">EV</div><div class="v">${fmtUSDb(d.inputs.currentEV)}</div></div>
      <div><div class="k">Implied growth</div><div class="v" style="color:var(--ac)">${fmt1(ig)}%</div></div>
      <div><div class="k">Trailing 5y CAGR</div><div class="v">${tg!=null?fmt1(tg)+'%':'—'}</div></div>
    </div>
  </div>`;
  out.innerHTML=html;
}

async function runDcf(){
  const sym=(document.getElementById('dcfSym').value||'').trim().toUpperCase();
  if(!sym){toast('Enter a ticker',false);return;}
  const years=parseInt(document.getElementById('dcfYears').value,10)||10;
  const r=parseFloat(document.getElementById('dcfR').value)/100;
  const tg=parseFloat(document.getElementById('dcfTg').value)/100;
  const btn=document.getElementById('dcfBtn');btn.disabled=true;btn.textContent='Computing…';
  try{
    const res=await fetch(`/api/dcf?symbol=${encodeURIComponent(sym)}&years=${years}&r=${r}&tg=${tg}`);
    const d=await res.json();
    renderDcf(d.error?{error:d.error}:d);
  }catch(e){renderDcf({error:e.message});}
  btn.disabled=false;btn.textContent='Compute';
}

function renderDrawdowns(d){
  const r=d.results||{};
  const symbols=POSITIONS.filter(p=>p.asset!=='Index').map(p=>p.symbol);
  if(!symbols.length){document.getElementById('ddBody').innerHTML='<div class="empty">No symbols to analyze.</div>';return;}
  let html='';
  for(const symb of symbols){
    const p=POSITIONS.find(x=>x.symbol===symb);
    const v=r[p.quoteSym||symb];
    if(!v||v.error){html+=`<div class="dd-stock"><div class="dd-head"><div><span class="sym">${esc(symb)}</span><span class="sym-meta">${esc(p.broker)}</span></div><div class="muted">${v?esc(v.error):'no data'}</div></div></div>`;continue;}
    const s=v.summary||{};
    const cur=s.currentlyInDrawdown?`<span class="dd-current under">In drawdown ${s.currentDDPct.toFixed(1)}%</span>`:`<span class="dd-current ok">At/near highs</span>`;
    let summaryHtml=`<span>Episodes: <b style="color:var(--tx)">${s.total}</b></span><span>Worst past: <b style="color:var(--rd)">${s.worstPastDDPct!=null?s.worstPastDDPct.toFixed(0)+'%':'—'}</b></span><span>Median recovery: <b style="color:var(--tx)">${s.medianRecoveryDays?Math.round(s.medianRecoveryDays/30)+' months':'—'}</b></span>`;
    let listHtml='';
    if(v.episodes&&v.episodes.length){
      listHtml='<div class="dd-list">'+v.episodes.slice().reverse().map(e=>{
        const dd=e.drawdownPct.toFixed(0)+'%';
        const peak=e.peakDate;
        const trough=e.troughDate;
        const rec=e.stillUnderwater?`still underwater · ${Math.round(e.daysPeakToNow/30)}mo`:`recovered in ${Math.round(e.daysPeakToRecovery/30)}mo`;
        const cls=e.stillUnderwater?'rec under':'rec';
        return `<div class="dd-row"><span>${esc(peak)}</span><span class="pct">${dd}</span><span>${esc(trough)}</span><span class="${cls}">${rec}</span></div>`;
      }).join('')+'</div>';
    }
    html+=`<div class="dd-stock">
      <div class="dd-head">
        <div><span class="sym">${esc(symb)}</span><span class="sym-meta">${esc(p.broker)}</span> ${cur}</div>
        <div class="dd-summary">${summaryHtml}</div>
      </div>
      ${listHtml}
    </div>`;
  }
  document.getElementById('ddBody').innerHTML=html;
  document.getElementById('ddMeta').textContent=`${symbols.length} symbols · drawdowns ≥15% · 10y window`;
}
</script>
<script id="app-boot">
async function loadPositions(){
  const r=await fetch('/api/positions');
  const d=await r.json();
  if(!r.ok||d.error){throw new Error(d.error||'failed to load positions');}
  POSITIONS=d.positions||[];
  // Populate the DCF quick-pick with stocks only.
  const sel=document.getElementById('dcfQuick');
  sel.innerHTML='<option value="">— quick pick —</option>'+POSITIONS.filter(p=>p.asset==='Stock').map(p=>`<option value="${esc(p.quoteSym||p.symbol)}">${esc(p.symbol)}</option>`).join('');
  sel.onchange=()=>{if(sel.value)document.getElementById('dcfSym').value=sel.value;};
}

async function loadValuation(){
  const stockSyms=POSITIONS.filter(p=>p.asset==='Stock').map(p=>p.quoteSym||p.symbol);
  if(!stockSyms.length){renderValuation({results:{}});return;}
  try{
    const r=await fetch('/api/valuation?symbols='+stockSyms.map(encodeURIComponent).join(','));
    const d=await r.json();
    if(d.error){document.getElementById('valBody').innerHTML=`<div class="empty"><span class="err" style="display:inline-block">${esc(d.error)}</span></div>`;return;}
    renderValuation(d);
  }catch(e){document.getElementById('valBody').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}

async function loadDrawdowns(){
  const syms=POSITIONS.filter(p=>p.asset!=='Index').map(p=>p.quoteSym||p.symbol);
  if(!syms.length){renderDrawdowns({results:{}});return;}
  try{
    const r=await fetch('/api/drawdowns?symbols='+syms.map(encodeURIComponent).join(','));
    const d=await r.json();
    if(d.error){document.getElementById('ddBody').innerHTML=`<div class="empty"><span class="err" style="display:inline-block">${esc(d.error)}</span></div>`;return;}
    renderDrawdowns(d);
  }catch(e){document.getElementById('ddBody').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}

async function boot(){
  loadTheme();
  try{await loadPositions();}catch(e){showError(e.message);return;}
  // Fire valuation + drawdowns in parallel; both can be slow on cold caches.
  loadValuation();
  loadDrawdowns();
  document.getElementById('footerMeta').textContent='Loaded '+new Date().toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  fetch('/api/version').then(r=>r.json()).then(v=>{
    console.log('%cHoldings','color:#d4b88b;font-weight:bold','build',v.shaShort,'@',v.region);
  }).catch(()=>{});
}
boot();
</script>
</body>
</html>
