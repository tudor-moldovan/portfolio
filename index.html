<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Pick Log — honest alpha vs SPY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1b1814;
  --sf:#24201b;
  --sf2:#2e2a23;
  --bd:rgba(238,220,186,0.07);
  --bd2:rgba(238,220,186,0.14);
  --tx:#eedcba;
  --mu:#a9a08c;
  --di:#6e6552;
  --ac:#d4b88b;
  --ac-hi:#e1c89d;
  --ac2:rgba(212,184,139,0.12);
  --ac3:rgba(212,184,139,0.28);
  --gr:#9eaf8a;
  --gr2:rgba(158,175,138,0.12);
  --rd:#c28a75;
  --rd2:rgba(194,138,117,0.12);
  --mu-bl:#8aa0a0;
  --display:'Cormorant Garamond',ui-serif,Georgia,serif;
  --serif:'Fraunces',ui-serif,Georgia,serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mo:'JetBrains Mono',ui-monospace,monospace;
  --shadow-sm:0 1px 3px rgba(30,20,10,0.35);
  --shadow-md:0 10px 30px -10px rgba(10,6,2,0.55),0 2px 6px rgba(10,6,2,0.28);
  --radius:16px;
  --radius-sm:10px;
}
:root.light{
  --bg:#f5ecd8;
  --sf:#fffbf1;
  --sf2:#ebe0c5;
  --bd:rgba(58,42,20,0.10);
  --bd2:rgba(58,42,20,0.18);
  --tx:#2a231a;
  --mu:#6b5f48;
  --di:#a39880;
  --ac:#8f6d38;
  --ac-hi:#75572c;
  --ac2:rgba(143,109,56,0.10);
  --ac3:rgba(143,109,56,0.22);
  --gr:#5c7d52;
  --gr2:rgba(92,125,82,0.10);
  --rd:#a5674d;
  --rd2:rgba(165,103,77,0.10);
  --mu-bl:#647a7a;
  --shadow-sm:0 1px 2px rgba(58,42,20,0.06);
  --shadow-md:0 10px 30px -10px rgba(58,42,20,0.14),0 2px 6px rgba(58,42,20,0.07);
}

body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:'ss01','cv11','kern','liga'}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 10% -10%,var(--ac2),transparent 55%),
             radial-gradient(ellipse 60% 45% at 95% 105%,rgba(154,175,176,0.12),transparent 65%);opacity:.9}
:root.light body::before{opacity:.6}

.up{color:var(--gr)}.dn{color:var(--rd)}.nt{color:var(--tx)}
.mono{font-family:var(--mo);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

/* Header */
header{background:rgba(27,24,20,0.78);backdrop-filter:blur(20px) saturate(140%);border-bottom:1px solid var(--bd);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:99}
:root.light header{background:rgba(245,236,216,0.85)}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{width:40px;height:40px;border:1px solid var(--ac3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:20px;color:var(--ac);transition:.25s}
.brand-mark:hover{background:var(--ac2);border-color:var(--ac)}
.brand-name{font-family:var(--display);font-weight:400;font-size:22px;letter-spacing:.005em;line-height:1.15}
.brand-sub{font-size:10px;color:var(--mu);font-weight:500;letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.h-r{display:flex;gap:10px;align-items:center}
.h-btn{background:transparent;border:1px solid var(--bd2);color:var(--mu);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.2s;font-family:var(--sans)}
.h-btn:hover{color:var(--ac);border-color:var(--ac3);background:var(--ac2)}
.theme-btn{background:none;border:1px solid var(--bd);color:var(--mu);cursor:pointer;font-size:15px;padding:0;border-radius:50%;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center}
.theme-btn:hover{color:var(--ac);border-color:var(--ac3);background:var(--ac2)}

/* Main layout */
main{max-width:1080px;margin:0 auto;padding:28px;display:flex;flex-direction:column;gap:22px}
@media(max-width:720px){main{padding:18px;gap:16px}}

/* ── The Gap hero ──────────────────────────────────────────────────────── */
.gap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden}
.gap-title{padding:18px 26px 4px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--di)}
.gap-grid{padding:10px 26px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:end}
@media(max-width:720px){.gap-grid{grid-template-columns:1fr;gap:16px;padding:10px 22px 20px}}
.gap-cell .l{font-size:10px;color:var(--di);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.gap-cell .v{font-family:var(--display);font-size:32px;font-weight:300;letter-spacing:-0.015em;line-height:1;font-variant-numeric:tabular-nums;color:var(--tx)}
.gap-cell .s{font-size:11px;color:var(--mu);margin-top:5px;font-family:var(--mo);font-variant-numeric:tabular-nums}
.gap-hero{border-top:1px solid var(--bd);background:linear-gradient(180deg,transparent,var(--ac2));padding:22px 26px}
.gap-hero .headline{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-0.005em;line-height:1.35;color:var(--tx)}
@media(max-width:720px){.gap-hero .headline{font-size:18px}}
.gap-hero .verdict{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);margin-bottom:8px}
.gap-hero strong{font-family:var(--display);font-weight:500;font-variant-numeric:tabular-nums}

/* ── Positions table ───────────────────────────────────────────────────── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden}
.card-hd{padding:18px 26px 14px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--bd);gap:12px;flex-wrap:wrap}
.card-ttl{font-family:var(--display);font-size:22px;font-weight:400;letter-spacing:.005em;color:var(--tx)}
.card-sub{font-size:10px;color:var(--di);letter-spacing:.14em;text-transform:uppercase;font-weight:600}

.pos-tbl{width:100%;border-collapse:collapse}
.pos-tbl thead th{padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--di);background:var(--sf2);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.pos-tbl th.r,.pos-tbl td.r{text-align:right}
.pos-tbl tbody td{padding:13px 16px;border-bottom:1px solid var(--bd);font-family:var(--mo);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap;vertical-align:middle}
.pos-tbl tbody tr:last-child td{border-bottom:none}
.pos-tbl tbody tr:hover td{background:var(--sf2)}
.pos-sym{font-family:var(--display);font-weight:500;font-size:16px;color:var(--ac);letter-spacing:-0.005em}
.pos-broker{font-family:var(--sans);font-size:10px;color:var(--mu);font-weight:500;margin-left:4px}
.pos-price-sub{font-family:var(--sans);font-size:10px;color:var(--di);margin-top:2px}
.pos-gap{font-family:var(--mo);font-weight:600;font-size:12px;font-variant-numeric:tabular-nums}
.pos-gap-s{font-size:10px;color:var(--mu);display:block;margin-top:1px;font-weight:400}

/* Mobile: convert table to card list */
@media(max-width:720px){
  .pos-tbl, .pos-tbl thead, .pos-tbl tbody, .pos-tbl tr, .pos-tbl td{display:block}
  .pos-tbl thead{display:none}
  .pos-tbl tbody tr{padding:14px 18px;border-bottom:1px solid var(--bd)}
  .pos-tbl tbody td{padding:2px 0;border:none;text-align:left !important;display:flex;justify-content:space-between;align-items:baseline}
  .pos-tbl tbody td::before{content:attr(data-l);font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--di)}
  .pos-tbl tbody td.head::before{content:''}
  .pos-tbl tbody td.head{display:flex;justify-content:space-between;padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--bd)}
  .pos-tbl tbody tr:hover td{background:transparent}
}

/* Footer row — portfolio totals */
.pos-tbl tfoot td{padding:16px;font-family:var(--display);font-weight:500;font-size:16px;color:var(--tx);border-top:1px solid var(--ac3);background:linear-gradient(180deg,transparent,var(--ac2))}
.pos-tbl tfoot td .n{font-family:var(--mo);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
@media(max-width:720px){.pos-tbl tfoot{display:block;padding:16px 18px;border-top:1px solid var(--ac3);background:linear-gradient(180deg,transparent,var(--ac2))}.pos-tbl tfoot tr{display:block}.pos-tbl tfoot td{display:flex;justify-content:space-between;padding:2px 0;border:none;background:transparent;font-size:13px}.pos-tbl tfoot td::before{content:attr(data-l);font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--di)}}

/* ── Empty / loading states ─────────────────────────────────────────────── */
.empty{padding:42px 22px;text-align:center}
.empty-t{font-family:var(--display);font-size:20px;font-weight:400;color:var(--mu);margin-bottom:6px}
.empty-s{font-size:12px;color:var(--di)}

/* ── Error banner ───────────────────────────────────────────────────────── */
.err{margin:0 0 6px;padding:12px 18px;background:var(--rd2);border:1px solid rgba(194,138,117,.28);border-left:3px solid var(--rd);border-radius:8px;color:var(--rd);font-size:12px;line-height:1.5}
.err strong{font-family:var(--serif);font-weight:600;letter-spacing:.04em}

/* ── Footer / meta ───────────────────────────────────────────────────────── */
.footer{text-align:center;font-size:10px;color:var(--di);padding:18px 0 28px;font-family:var(--mo);letter-spacing:.08em}
.footer a{color:var(--mu);text-decoration:none;border-bottom:1px dashed var(--bd2)}
.footer a:hover{color:var(--ac)}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--sf2) 0%,var(--sf) 50%,var(--sf2) 100%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:4px;display:inline-block;height:1em;width:80px;vertical-align:middle}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-mark">L</div>
    <div>
      <div class="brand-name">The Pick Log</div>
      <div class="brand-sub">Alpha vs SPY · Honest reckoning</div>
    </div>
  </div>
  <div class="h-r">
    <a href="/edit" class="h-btn">Edit</a>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">&#9681;</button>
  </div>
</header>

<main>
  <div id="errBox"></div>

  <div class="gap">
    <div class="gap-title">The Gap</div>
    <div class="gap-grid">
      <div class="gap-cell"><div class="l">You have</div><div class="v mono" id="gapYou">—</div><div class="s" id="gapYouSub">&nbsp;</div></div>
      <div class="gap-cell"><div class="l">In SPY you'd have</div><div class="v mono" id="gapSpy">—</div><div class="s" id="gapSpySub">&nbsp;</div></div>
      <div class="gap-cell"><div class="l">Gap vs SPY</div><div class="v mono" id="gapNum">—</div><div class="s" id="gapPct">&nbsp;</div></div>
    </div>
    <div class="gap-hero">
      <div class="verdict" id="gapVerdict">Loading…</div>
      <div class="headline" id="gapHeadline">Fetching live prices and SPY history…</div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-ttl">Positions</div>
      <div class="card-sub" id="posMeta">—</div>
    </div>
    <div id="posBody">
      <div class="empty"><div class="empty-t">Loading…</div><div class="empty-s">Fetching live prices + SPY-equivalent history</div></div>
    </div>
  </div>

  <div class="footer">
    <span id="footerMeta">—</span>
    &nbsp;·&nbsp;<a href="/edit">Edit positions</a>
  </div>
</main>

<script>
// ── Formatting helpers ───────────────────────────────────────────────────
function fmtUSD0(n){if(n==null||isNaN(n))return '—';const s=Math.round(Math.abs(n)).toLocaleString('en-US');return (n<0?'−':'')+'$'+s;}
function fmtUSD(n){if(n==null||isNaN(n))return '—';const s=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return (n<0?'−':'')+'$'+s;}
function fmtPct(n){if(n==null||isNaN(n))return '—';return (n>=0?'+':'')+n.toFixed(2)+'%';}
function fmtLocalPrice(p,ccy){if(p==null)return '—';const n=p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return ccy==='EUR'?'€'+n:ccy==='RON'?n+' RON':'$'+n;}
function gc(n){if(n==null||isNaN(n))return 'var(--mu)';return n>=0?'var(--gr)':'var(--rd)';}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── Theme ────────────────────────────────────────────────────────────────
function toggleTheme(){document.documentElement.classList.toggle('light');localStorage.setItem('pl_theme',document.documentElement.classList.contains('light')?'light':'dark');}
function loadTheme(){if(localStorage.getItem('pl_theme')==='light')document.documentElement.classList.add('light');}

// ── Hero narrative ───────────────────────────────────────────────────────
// A single honest sentence. Opinionated because the whole app exists for this.
function buildHeadline(p){
  if(!p)return{verdict:'—',html:'No positions yet.'};
  const g=p.gapUSD;
  const absG=Math.abs(g);
  const abspct=Math.abs(p.gapPct||0);
  const since=p.earliestBuy?new Date(p.earliestBuy).toLocaleDateString('en-GB',{month:'short',year:'numeric'}):'—';
  const plFmt=fmtUSD0(p.plUSD);
  const gFmt=fmtUSD0(absG);
  if(g>0.005*p.spyEquivUSD){
    return{verdict:'AHEAD OF THE BENCHMARK',html:`You're <strong style="color:var(--gr)">+${gFmt}</strong> ahead of SPY (<strong>${fmtPct(p.gapPct)}</strong>) since ${since}. Your picks are adding value — keep a cold eye on whether the edge is from a few winners or broad.`};
  }
  if(g<-0.005*p.spyEquivUSD){
    return{verdict:'LOSING TO THE BENCHMARK',html:`You have ${plFmt}. In SPY you'd have <strong>${fmtUSD0(p.spyEquivUSD)}</strong>. You're <strong style="color:var(--rd)">−${gFmt}</strong> (<strong>${fmtPct(p.gapPct)}</strong>) behind the index since ${since}. Stock-picking is <em>subtracting</em> value right now.`};
  }
  return{verdict:'TRACKING THE BENCHMARK',html:`You're within ±0.5% of SPY since ${since}. Stock-picking is neither helping nor hurting — compared to buying an index fund and doing nothing.`};
}

// ── Render ───────────────────────────────────────────────────────────────
function renderError(msg){
  document.getElementById('errBox').innerHTML=`<div class="err"><strong>ERROR</strong> · ${esc(msg)}</div>`;
}

function renderGap(d){
  const p=d.portfolio;
  if(!p){
    document.getElementById('gapYou').textContent='—';
    document.getElementById('gapSpy').textContent='—';
    document.getElementById('gapNum').textContent='—';
    document.getElementById('gapVerdict').textContent='NO POSITIONS';
    document.getElementById('gapHeadline').textContent='Add positions via /edit to start tracking alpha.';
    return;
  }
  document.getElementById('gapYou').textContent=fmtUSD(p.valueUSD);
  document.getElementById('gapYouSub').innerHTML=`<span style="color:${gc(p.plUSD)}">${fmtUSD0(p.plUSD)} (${fmtPct(p.plPct)})</span> · cost basis`;
  document.getElementById('gapSpy').textContent=fmtUSD(p.spyEquivUSD);
  document.getElementById('gapSpySub').textContent=d.spyLatest?'SPY @ $'+d.spyLatest.toFixed(2):'—';
  const gapEl=document.getElementById('gapNum');
  gapEl.textContent=fmtUSD(p.gapUSD);
  gapEl.style.color=gc(p.gapUSD);
  document.getElementById('gapPct').innerHTML=`<span style="color:${gc(p.gapUSD)}">${fmtPct(p.gapPct)}</span> · since ${p.earliestBuy||'—'}`;
  const h=buildHeadline(p);
  document.getElementById('gapVerdict').textContent=h.verdict;
  document.getElementById('gapVerdict').style.color=p.gapUSD>=0?'var(--gr)':'var(--rd)';
  document.getElementById('gapHeadline').innerHTML=h.html;
}

function renderPositions(d){
  const rows=d.positions||[];
  if(!rows.length){
    document.getElementById('posBody').innerHTML='<div class="empty"><div class="empty-t">No positions</div><div class="empty-s">Add some via <a href="/edit" style="color:var(--ac)">Edit</a></div></div>';
    return;
  }
  // Sort by |gap|, biggest losers first — the things that need attention
  const sorted=[...rows].sort((a,b)=>(a.gapUSD||0)-(b.gapUSD||0));
  let html='<table class="pos-tbl"><thead><tr><th>Asset</th><th class="r">Price</th><th class="r">Value (USD)</th><th class="r">P&amp;L</th><th class="r">vs SPY</th></tr></thead><tbody>';
  for(const p of sorted){
    const disp=p.symbol.replace(/-R$/,'');
    const priceStr=fmtLocalPrice(p.livePrice,p.currency);
    const dayStr=p.changePct!=null?`<span style="color:${gc(p.changePct)}">${fmtPct(p.changePct)}</span> today`:'&nbsp;';
    html+=`<tr>
      <td class="head" data-l=""><span><span class="pos-sym">${esc(disp)}</span><span class="pos-broker">${esc(p.broker||'')}</span></span><span style="font-size:10px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase">${esc(p.asset||'')}</span></td>
      <td class="r" data-l="Price">${priceStr}<div class="pos-price-sub">${dayStr}</div></td>
      <td class="r" data-l="Value">${fmtUSD0(p.valueUSD)}</td>
      <td class="r" data-l="P&L" style="color:${gc(p.plUSD)}">${fmtUSD0(p.plUSD)}<div class="pos-price-sub" style="color:${gc(p.plUSD)}">${fmtPct(p.plPct)}</div></td>
      <td class="r" data-l="vs SPY"><span class="pos-gap" style="color:${gc(p.gapUSD)}">${fmtUSD0(p.gapUSD)}</span><span class="pos-gap-s" style="color:${gc(p.gapUSD)}">${fmtPct(p.gapPct)}</span></td>
    </tr>`;
  }
  const p=d.portfolio;
  html+=`</tbody><tfoot><tr>
    <td data-l="Total">Total</td>
    <td data-l=""></td>
    <td class="r" data-l="Value"><span class="n">${fmtUSD0(p.valueUSD)}</span></td>
    <td class="r" data-l="P&L"><span class="n" style="color:${gc(p.plUSD)}">${fmtUSD0(p.plUSD)} (${fmtPct(p.plPct)})</span></td>
    <td class="r" data-l="vs SPY"><span class="n" style="color:${gc(p.gapUSD)}">${fmtUSD0(p.gapUSD)} (${fmtPct(p.gapPct)})</span></td>
  </tr></tfoot></table>`;
  document.getElementById('posBody').innerHTML=html;
  document.getElementById('posMeta').textContent=`${rows.length} positions · sorted by gap`;
}

// ── Load ────────────────────────────────────────────────────────────────
async function loadAll(){
  try{
    const r=await fetch('/api/spygap');
    const d=await r.json();
    if(!r.ok||d.error){renderError(d.error||('HTTP '+r.status));return;}
    if(d.spyError)renderError('SPY history: '+d.spyError+' (gap figures may be stale/wrong)');
    renderGap(d);
    renderPositions(d);
    const when=d.generatedAt?new Date(d.generatedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
    document.getElementById('footerMeta').textContent='Updated '+when;
  }catch(e){
    renderError(e.message);
  }
}

loadTheme();
loadAll();
// Refresh every 2 minutes; that's enough — this isn't a trading screen.
setInterval(loadAll,120000);
fetch('/api/version').then(r=>r.json()).then(v=>{
  console.log('%cThe Pick Log','color:#d4b88b;font-weight:bold;font-size:14px','build',v.shaShort,'@',v.region);
}).catch(()=>{});
</script>
</body>
</html>
